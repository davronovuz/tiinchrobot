services:
  bot:
    build: .
    container_name: tiinchrobot
    restart: always
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cobalt:
        condition: service_started
      bgutil:
        condition: service_started
    volumes:
      - bot_temp:/tmp/tiinchbot_downloads
      - ./cookies.txt:/app/cookies.txt:ro
    environment:
      COBALT_API_URL: "http://cobalt:9000"
      COOKIES_FILE: "/app/cookies.txt"
      BGUTIL_URL: "http://bgutil:4416"
    networks:
      - botnet

  cobalt:
    image: ghcr.io/imputnet/cobalt:10
    container_name: tiinchrobot_cobalt
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      # API sozlamalari
      API_URL: "http://cobalt:9000"
      API_PORT: "9000"
      # YouTube uchun muhim sozlamalar
      COOKIE_PATH: "/cookies.json"
      CUSTOM_INNERTUBE_CLIENT: "TV_SIMPLY"
      YOUTUBE_GENERATE_PO_TOKENS: "1"
      YOUTUBE_USE_ONESIE: "1"
      YOUTUBE_PLAYER_ID: "9f4cc5e4"
      # Limitlar
      DURATION_LIMIT: "3600"
      RATELIMIT_WINDOW: "60"
      RATELIMIT_MAX: "30"
      TUNNEL_LIFESPAN: "120"
      # WARP proxy orqali YouTube IP blokirovkadan o'tish
      HTTP_PROXY: "socks5://warp:9091"
      HTTPS_PROXY: "socks5://warp:9091"
    volumes:
      - ./cookies.json:/cookies.json:ro
    depends_on:
      warp:
        condition: service_started
    networks:
      - botnet

  # Cloudflare WARP — YouTube datacenter IP blokirovkasini chetlab o'tish
  warp:
    image: monius/docker-warp-socks
    container_name: tiinchrobot_warp
    restart: always
    cap_add:
      - NET_ADMIN
    environment:
      - WARP_SLEEP=2
    volumes:
      - warp_data:/var/lib/cloudflare-warp
    networks:
      - botnet

  # YouTube PO Token generatori — yt-dlp uchun avtomatik token
  bgutil:
    image: brainicism/bgutil-ytdlp-pot-provider
    container_name: tiinchrobot_bgutil
    restart: always
    init: true
    environment:
      TOKEN_TTL: "6"
    networks:
      - botnet

  postgres:
    image: postgres:16-alpine
    container_name: tiinchrobot_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-tiinchrobot}
      POSTGRES_USER: ${DB_USER:-botuser}
      POSTGRES_PASSWORD: ${DB_PASS:-botpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-botuser} -d ${DB_NAME:-tiinchrobot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - botnet

  redis:
    image: redis:7-alpine
    container_name: tiinchrobot_redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - botnet

volumes:
  postgres_data:
  redis_data:
  bot_temp:
  warp_data:

networks:
  botnet:
    driver: bridge
